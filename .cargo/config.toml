# Cargo build optimization config for kestrel-agent
# Uses mold linker (fastest available) via clang

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=mold",
]

[profile.dev]
opt-level = 0        # No optimization for max compile speed
debug = 1            # Minimal debug info (line tables only)
codegen-units = 256  # Max parallelism for fastest compilation
incremental = true   # Enable incremental compilation

[profile.dev.package."*"]
opt-level = 2        # Optimize dependencies even in dev mode

[profile.release]
lto = "thin"         # Thin LTO for good balance of speed/size
codegen-units = 16   # Reasonable parallelism for release
strip = true         # Strip debug symbols for smaller binary
