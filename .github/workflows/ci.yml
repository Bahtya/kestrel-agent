name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: Test & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          toolchain: "1.75"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  merge-conflict-check:
    name: Merge Conflict Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect merge conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin "${BASE_REF}"
          git checkout "origin/${BASE_REF}"
          git merge --no-commit --no-ff "origin/${HEAD_REF}" 2>/dev/null || true

          conflicts=$(git diff --name-only --diff-filter=U 2>/dev/null)

          git merge --abort 2>/dev/null || true

          if [ -n "$conflicts" ]; then
            echo "::error::Merge conflicts detected"
            conflict_list=$(echo "$conflicts" | sed 's/^/  - /')
            gh pr comment "$PR_NUMBER" --body ":warning: **Merge conflicts detected with \`${BASE_REF}\`**

            Conflicting files:
            ${conflict_list}

            Please resolve these conflicts before merging."
            exit 1
          else
            echo "No merge conflicts detected."
          fi
